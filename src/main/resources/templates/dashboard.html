<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DocFlow AI | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-processed { color: green; font-weight: bold; }
        .status-pending { color: orange; }
        .status-failed { color: red; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container border-bottom">
        <span class="navbar-brand mb-0 h1">DocFlow AI Dashboard</span>
    </div>
</nav>

<div class="container">
    <div class="card show-sm">
        <div class="card-header bg-white">
            <h5 class="mb-0">Yüklenen Son Belgeler</h5>
        </div>
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-light">
                <tr>
                    <th>Dosya Adı</th>
                    <th>Müşteri</th>
                    <th>Yükleme Tarihi</th>
                    <th>Statü</th>
                    <th>İşlem</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="doc : ${documents}">
                    <td th:text="${doc.originalFilename}">fatura.png</td>
                    <td th:text="${doc.client != null ? doc.client.companyName : 'Bireysel'}">Müşteri</td>
                    <td th:text="${#temporals.format(doc.uploadedAt, 'dd-MM-yyyy HH:mm')}">Tarih</td>
                    <td>
                        <span th:text="${doc.status}"
                              th:class="${'status-' + doc.status.toString().toLowerCase()}">STATU</span>
                    </td>
                    <td>
                        <a th:href="@{'/admin/dashboard/document/' + ${doc.id}}" class="btn btn-sm btn-outline-primary">Detay</a>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="d-flex justify-content-between align-items-center mt-3">
                <div class="text-muted small">
                    Toplam <span th:text="${totalItems}">0</span> belgeden
                    sayfa <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span>
                </div>
                <nav th:if="${totalPages > 0}">
                    <ul class="pagination mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/dashboard(page=${currentPage - 1})}">Önceki</a>
                        </li>

                        <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/dashboard(page=${currentPage + 1})}">Sonraki</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
</body>
</html>
