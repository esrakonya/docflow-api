<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Belge Detayı | DocFlow AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between mb-4">
        <h2>Fatura Detayları</h2>
        <a href="/admin/dashboard" class="btn btn-secondary">Geri Dön</a>
    </div>

    <div class="row" th:if="${data != null}">

        <div class="col-md-4">
            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Özet Bilgi</h5>
                    <p><strong>Satıcı:</strong> <span th:text="${data.vendorName}"></span></p>
                    <p><strong>Fatura No:</strong> <span th:text="${data.invoiceNumber}"></span></p>
                    <p><strong>Tarih:</strong> <span th:text="${data.invoiceDate}"></span></p>
                    <h4 class="text-primary mt-3" th:text="${data.totalAmount + ' ' + data.currency}">0.00 TRY</h4>
                    <div class="alert alert-info mt-2">
                        Güven Skoru: <strong th:text="${#numbers.formatDecimal(data.overallConfidence * 100, 1, 1) + '%'}"></strong>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">Fatura Kalemleri</div>
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>Açıklama</th>
                            <th>Miktar</th>
                            <th>Birim Fiyat</th>
                            <th>Toplam</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${data.lineItems}">
                            <td th:text="${item.description}"></td>
                            <td th:text="${item.quantity}"></td>
                            <td th:text="${item.unitPrice}"></td>
                            <td th:text="${item.lineTotal}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="alert alert-warning" th:if="${data == null}">
        Bu belge henüz işlenmemiş veya bir hata oluşmuş.
    </div>

</div>
</body>
</html>
